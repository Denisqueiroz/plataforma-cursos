name: CI - Build da Imagem Docker

on:
  push:
    branches: [ "main" ]

jobs:
  construir-imagem:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Construir a imagem Docker
        run: docker build -t plata-cursos . 
        
      - name: Confirmar que a imagem foi criada
        run: docker images