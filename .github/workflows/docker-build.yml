name: CI - Build e Push para GHCR

on:
  push:
    branches: [ "main" ]

permissions:
  packages: write
  contents: read

env:
  IMAGE_NAME: ghcr.io/denisqueiroz/plata-cursos 

jobs:
  construir-e-publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      # 1. Configura o emulador de arquiteturas (essencial para gerar ARM64 dentro do GitHub)
      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Configura o construtor avançado do Docker (Buildx)
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fazer Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Substitui os comandos antigos de build e push por este bloco oficial que suporta multi-plataforma
      - name: Construir e Enviar a imagem Docker (Multi-Arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest