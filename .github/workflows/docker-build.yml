name: CI - Build e Push para GHCR

on:
  push:
    branches: [ "main" ]

permissions:
  packages: write
  contents: read

env:
 
  IMAGE_NAME: ghcr.io/denisqueiroz/plata-cursos 

jobs:
  construir-e-publicar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Fazer Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir a imagem Docker
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest .

      - name: Enviar a imagem para o Cofre (Push)
        run: docker push --all-tags ${{ env.IMAGE_NAME }}