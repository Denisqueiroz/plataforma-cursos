{% extends 'cursos/base.html' %}

{% block title %}Login - Plataforma de Cursos{% endblock %}

{% block body_class %}login-bg{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 col-lg-4">
        <div class="card glass-card border-0 p-4">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="mb-3">
                        <i class="bi bi-hdd-network text-white opacity-75" style="font-size: 3rem;"></i>
                    </div>
                    <h3 class="fw-bold text-white mb-0" style="letter-spacing: 1px;">PLATAFORMA</h3>
                    <p class="text-light opacity-75 mt-1 small">Acesse sua conta para continuar</p>
                </div>
                
                {% if form.errors %}
                    <div class="alert alert-danger text-center bg-danger text-white border-0 py-2 small" style="background-color: rgba(220, 53, 69, 0.8) !important;">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i> Usuário ou senha incorretos.
                    </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-4 position-relative">
                        <i class="bi bi-envelope-fill position-absolute text-muted" style="left: 18px; top: 50%; transform: translateY(-50%); z-index: 10;"></i>
                        <input type="text" name="username" class="form-control glass-input ps-5 py-3" placeholder="seu@email.com" required id="id_username">
                    </div>
                    
                    <div class="mb-4 position-relative">
                        <i class="bi bi-lock-fill position-absolute text-muted" style="left: 18px; top: 50%; transform: translateY(-50%); z-index: 10;"></i>
                        <input type="password" name="password" class="form-control glass-input ps-5 py-3" placeholder="Sua senha" required id="id_password">
                    </div>
                    
                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-glass-login btn-lg fw-bold py-3 text-uppercase" style="letter-spacing: 1px;">
                            Entrar <i class="bi bi-arrow-right ms-2 fs-5"></i>
                        </button>
                    </div>
                    <input type="hidden" name="next" value="{{ next }}">
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
